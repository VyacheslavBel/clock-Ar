<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR: Часы с анимацией</title>
    
    <!-- Локальные библиотеки -->
    <script src="aframe.min.js"></script>
    <script src="mindar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #ui {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: fit-content;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            transition: background-color 0.3s;
        }
        
        #ui.success {
            background: rgba(40, 167, 69, 0.9);
        }
        
        #ui.error {
            background: rgba(220, 53, 69, 0.9);
        }
        
        #ui.warning {
            background: rgba(255, 193, 7, 0.9);
            color: #000;
        }
        
        .instructions {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 999;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(3px);
            width: fit-content;
            margin: 0 auto;
            pointer-events: none;
        }
        
        /* Скрываем предупреждение о вибрации */
        .instructions small {
            display: block;
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="ui">Загрузка...</div>
    <div class="instructions">
        Наведите камеру на изображение часов
        <small>Для лучшего распознавания обеспечьте хорошее освещение</small>
    </div>

    <!-- AR Сцена -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterBeta: 0.001;"
        color-space="sRGB"
        embedded
        renderer="colorManagement: true; antialias: true; alpha: false;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        background="color: black"
    >
        <!-- Камера -->
        <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
        
        <!-- Освещение -->
        <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.8" position="1 2 1"></a-light>
        <a-light type="directional" color="#fff9e6" intensity="1.2" position="-1 1 0.5"></a-light>
        
        <!-- 3D Модель часов -->
        <a-entity 
            mindar-image-target="targetIndex: 0"
            gltf-model="./clock-animation.glb"
            scale="0.5 0.5 0.5"      <!-- Измените это значение для масштабирования -->
            position="0 0 0"           <!-- Измените для смещения модели -->
            rotation="0 0 0"           <!-- Измените для поворота модели -->
            id="clock-model"
            animation-mixer="clip: *; loop: repeat; timeScale: 1"
        ></a-entity>
    </a-scene>

    <script>
        (function() {
            const uiElement = document.getElementById('ui');
            const modelEntity = document.getElementById('clock-model');
            
            function setStatus(text, type = 'info') {
                uiElement.textContent = text;
                uiElement.className = '';
                if (type === 'success') uiElement.classList.add('success');
                else if (type === 'error') uiElement.classList.add('error');
                else if (type === 'warning') uiElement.classList.add('warning');
            }
            
            document.addEventListener('DOMContentLoaded', function() {
                setStatus('Инициализация...');
                
                const scene = document.querySelector('a-scene');
                
                if (!scene) {
                    setStatus('Ошибка: сцена не найдена', 'error');
                    return;
                }
                
                // Обработчик готовности AR
                scene.addEventListener('arReady', function() {
                    console.log('MindAR готов');
                    setStatus('Ищу часы...');
                });
                
                // Обработчик ошибок AR
                scene.addEventListener('arError', function(event) {
                    console.error('AR ошибка:', event.detail.error);
                    let errorMsg = 'Ошибка доступа к камере';
                    if (event.detail.error && event.detail.error.message) {
                        if (event.detail.error.message.includes('Permission')) {
                            errorMsg = 'Нет доступа к камере';
                        } else if (event.detail.error.message.includes('NotFound')) {
                            errorMsg = 'Камера не найдена';
                        }
                    }
                    setStatus(errorMsg, 'error');
                });
                
                // Обработка загрузки модели
                if (modelEntity) {
                    modelEntity.addEventListener('model-loaded', function() {
                        console.log('Модель успешно загружена');
                        setStatus('Модель загружена');
                    });
                    
                    modelEntity.addEventListener('model-error', function() {
                        console.error('Ошибка загрузки модели');
                        setStatus('Ошибка загрузки 3D модели', 'error');
                    });
                }
                
                // События обнаружения цели
                const target = document.querySelector('[mindar-image-target]');
                if (target) {
                    target.addEventListener('targetFound', function() {
                        console.log('Цель найдена!');
                        setStatus('Часы найдены! ✓', 'success');
                        
                        // Убираем вибрацию, так как она блокируется браузером
                        // Вместо этого просто показываем статус
                    });
                    
                    target.addEventListener('targetLost', function() {
                        console.log('Цель потеряна');
                        setStatus('Ищу часы...');
                    });
                }
                
                // Таймаут для отладки
                setTimeout(() => {
                    const currentStatus = uiElement.textContent;
                    if (currentStatus === 'Загрузка...' || currentStatus === 'Инициализация...') {
                        setStatus('Проверьте камеру и маркер', 'warning');
                    }
                }, 10000);
            });
        })();
    </script>
</body>
</html>
