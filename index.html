<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR: Часы с анимацией</title>
    
    <!-- Подключение локальных библиотек -->
    <script src="aframe.min.js"></script>
    <!-- Подключаем Stats для MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
    <script src="mindar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #ui {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: fit-content;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            transition: background-color 0.3s;
        }
        
        #ui.success {
            background: rgba(40, 167, 69, 0.9);
        }
        
        #ui.error {
            background: rgba(220, 53, 69, 0.9);
        }
        
        #ui.warning {
            background: rgba(255, 193, 7, 0.9);
            color: #000;
        }
        
        .instructions {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 999;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(3px);
            width: fit-content;
            margin: 0 auto;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">Загрузка...</div>
    <div class="instructions">Наведите камеру на изображение часов</div>

    <!-- AR Сцена - исправленная конфигурация без showStats -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterBeta: 0.001;"
        color-space="sRGB"
        embedded
        renderer="colorManagement: true; antialias: true; alpha: false;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        background="color: black"
    >
        <!-- Камера -->
        <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
        
        <!-- Освещение -->
        <a-entity light="type: ambient; color: #FFFFFF; intensity: 1.5"></a-entity>
        <a-entity light="type: directional; color: #FFFFFF; intensity: 2.0; position: 1 2 1"></a-entity>
        <a-entity light="type: directional; color: #FFF9E6; intensity: 1.5; position: -1 1 0.5"></a-entity>
        
        <!-- 3D модель часов -->
        <a-entity 
            mindar-image-target="targetIndex: 0"
            gltf-model="./clock-animation.glb"
            position="0 0 0"
            scale="1 1 1"
            rotation="0 0 0"
            visible="true"
            id="clock-model"
            animation-mixer="clip: *; loop: repeat; timeScale: 1"
        ></a-entity>
        
        <!-- Запасной куб на случай проблем с моделью -->
        <a-entity 
            mindar-image-target="targetIndex: 0"
            geometry="primitive: box; width: 0.3; height: 0.3; depth: 0.3"
            material="color: red; transparent: true; opacity: 0.5"
            position="0 0.5 0"
            visible="false"
            id="fallback-cube"
        ></a-entity>
    </a-scene>

    <script>
        (function() {
            const uiElement = document.getElementById('ui');
            const modelEntity = document.getElementById('clock-model');
            const fallbackCube = document.getElementById('fallback-cube');
            
            function setStatus(text, type = 'info') {
                uiElement.textContent = text;
                uiElement.className = '';
                if (type === 'success') uiElement.classList.add('success');
                else if (type === 'error') uiElement.classList.add('error');
                else if (type === 'warning') uiElement.classList.add('warning');
            }
            
            // Проверка существования файлов
            async function checkFileExists(url) {
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    return response.ok;
                } catch {
                    return false;
                }
            }
            
            document.addEventListener('DOMContentLoaded', async function() {
                setStatus('Проверка файлов...');
                
                // Проверяем наличие targets.mind
                const mindFileExists = await checkFileExists('./targets.mind');
                if (!mindFileExists) {
                    setStatus('Ошибка: файл targets.mind не найден', 'error');
                    return;
                }
                
                // Проверяем наличие модели
                const modelExists = await checkFileExists('./clock-animation.glb');
                if (!modelExists) {
                    setStatus('Ошибка: файл clock-animation.glb не найден', 'error');
                    return;
                }
                
                setStatus('Инициализация AR...');
                
                const scene = document.querySelector('a-scene');
                
                if (!scene) {
                    setStatus('Ошибка: сцена не найдена', 'error');
                    return;
                }
                
                // Обработчик готовности AR
                scene.addEventListener('arReady', function() {
                    console.log('MindAR готов');
                    setStatus('Ищу часы...');
                });
                
                // Обработчик ошибок AR
                scene.addEventListener('arError', function(event) {
                    console.error('AR ошибка:', event.detail.error);
                    let errorMsg = 'Ошибка камеры';
                    if (event.detail.error && event.detail.error.message) {
                        if (event.detail.error.message.includes('Permission')) {
                            errorMsg = 'Нет доступа к камере';
                        } else if (event.detail.error.message.includes('NotFound')) {
                            errorMsg = 'Камера не найдена';
                        }
                    }
                    setStatus(errorMsg, 'error');
                });
                
                // Обработка загрузки модели
                if (modelEntity) {
                    modelEntity.addEventListener('model-loaded', function() {
                        console.log('Модель успешно загружена');
                        setStatus('Модель загружена');
                        // Прячем запасной куб
                        if (fallbackCube) {
                            fallbackCube.setAttribute('visible', 'false');
                        }
                    });
                    
                    modelEntity.addEventListener('model-error', function(error) {
                        console.error('Ошибка загрузки модели:', error);
                        setStatus('Ошибка загрузки 3D модели', 'error');
                        // Показываем запасной куб
                        if (fallbackCube) {
                            fallbackCube.setAttribute('visible', 'true');
                        }
                    });
                }
                
                // События обнаружения цели
                const target = document.querySelector('[mindar-image-target]');
                if (target) {
                    target.addEventListener('targetFound', function() {
                        console.log('Цель найдена!');
                        setStatus('Часы найдены! ✓', 'success');
                        
                        // Убеждаемся что модель видима
                        if (modelEntity) {
                            modelEntity.setAttribute('visible', 'true');
                        }
                        
                        if (navigator.vibrate) {
                            navigator.vibrate(50);
                        }
                    });
                    
                    target.addEventListener('targetLost', function() {
                        console.log('Цель потеряна');
                        setStatus('Ищу часы...');
                    });
                }
                
                // Таймаут для отладки
                setTimeout(() => {
                    const currentStatus = uiElement.textContent;
                    if (currentStatus === 'Загрузка...' || currentStatus === 'Инициализация AR...') {
                        setStatus('Проверьте камеру и маркер', 'warning');
                    }
                }, 10000);
            });
            
            // Глобальная обработка ошибок
            window.addEventListener('error', function(event) {
                console.error('Глобальная ошибка:', event.error);
                
                // Специфичная обработка для Stats is not defined
                if (event.error && event.error.message && event.error.message.includes('Stats is not defined')) {
                    console.warn('Stats.js не подключен, но это не критично');
                    // Продолжаем работу - ошибка не фатальна
                    setStatus('Инициализация... (игнорируем Stats)');
                } else {
                    setStatus('Ошибка: ' + (event.error ? event.error.message : 'неизвестная'), 'error');
                }
            }, true);
            
            // Перехват непойманных Promise rejections
            window.addEventListener('unhandledrejection', function(event) {
                console.error('Unhandled Promise Rejection:', event.reason);
            });
            
        })();
    </script>
</body>
</html>
