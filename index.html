<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Clock Final</title>
    <!-- Локальные библиотеки из твоего репозитория -->
    <script src="./aframe.min.js"></script>
    <script src="./mindar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; width: 100vw; height: 100vh; }
      #ui {
        position: fixed; top: 20px; left: 20px; z-index: 1000;
        color: white; font-family: sans-serif; background: rgba(0,0,0,0.8);
        padding: 15px; border-radius: 12px; pointer-events: none;
      }
      .a-enter-vr, .a-enter-ar { display: none !important; }
    </style>
  </head>
  <body>
    <div id="ui">ЗАГРУЗКА...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes; uiLoading: no;" 
      embedded renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="clockModel" src="./clock-animation.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- ВАЖНО: id="target" должен быть тут! -->
      
        <!-- ТЕСТОВЫЙ КУБ (удалишь потом) -->
        <a-box color="red" position="0 0 0.1" scale="0.1 0.1 0.1"></a-box>
        
        <!-- ТВОЯ МОДЕЛЬ (уменьшил масштаб до 0.5) -->
        <a-gltf-model 
          src="#clockModel" 
          position="0 0 0" 
          scale="0.5 0.5 0.5" 
          rotation="0 0 0">
        </a-gltf-model>
      

      <a-light type="ambient" intensity="1.2"></a-light>
      <a-light type="directional" position="0 1 1" intensity="0.8"></a-light>
    </a-scene>

    <script>
      // Используем интервал, чтобы дождаться появления элементов в DOM
      const checkElements = setInterval(() => {
        const ui = document.getElementById('ui');
        const targetEl = document.querySelector('#target');
        const sceneEl = document.querySelector('a-scene');

        if (ui && targetEl && sceneEl) {
          clearInterval(checkElements); // Элементы найдены, останавливаем поиск
          
          ui.innerText = "ИЩУ ЧАСЫ...";

          targetEl.addEventListener("targetFound", () => {
            ui.innerText = "ЕСТЬ КОНТАКТ!";
            ui.style.background = "green";
          });

          targetEl.addEventListener("targetLost", () => {
            ui.innerText = "ПОТЕРЯНО. ИЩУ СНОВА...";
            ui.style.background = "rgba(0,0,0,0.8)";
          });

          console.log("AR система инициализирована");
        }
      }, 100);
    </script>
  </body>
</html>
