
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebAR Clock Starter</title>
<script src="./three.js"></script>
<script src="./GLTFLoader.js"></script>
<script src="./mindar-image-three.prod.js"></script>
<style>
body{margin:0;overflow:hidden;font-family:Arial;}
#ui{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:white;padding:12px 22px;border-radius:30px;z-index:1000;}
#debug{position:fixed;bottom:20px;left:20px;right:20px;background:rgba(0,0,0,0.8);color:#0f0;padding:10px;font-family:monospace;font-size:12px;border-radius:10px;max-height:150px;overflow:auto;z-index:1000;}
</style>
</head>
<body>
<div id="ui">Загрузка AR...</div>
<div id="debug"></div>
<script>
function debug(msg){console.log(msg);document.getElementById("debug").innerHTML+=`[${new Date().toLocaleTimeString()}] ${msg}<br>`;}
function status(text){document.getElementById("ui").innerText=text;}
document.addEventListener("DOMContentLoaded",async()=>{
debug("Старт WebAR");
const mindar=new window.MINDAR.IMAGE.MindARThree({container:document.body,imageTargetSrc:"./targets.mind",maxTrack:1});
const {renderer,scene,camera}=mindar;
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000,0);
renderer.domElement.style.position="absolute";
renderer.domElement.style.top="0";
renderer.domElement.style.left="0";
renderer.domElement.style.zIndex="10";

const light=new THREE.AmbientLight(0xffffff,1.2);scene.add(light);
const dir=new THREE.DirectionalLight(0xffffff,1);dir.position.set(1,2,1);scene.add(dir);

const anchor=mindar.addAnchor(0);

const geo=new THREE.BoxGeometry(0.2,0.2,0.2);
const mat=new THREE.MeshStandardMaterial({color:0xff0000});
const cube=new THREE.Mesh(geo,mat);cube.position.set(0,0.1,0);
anchor.group.add(cube);
debug("Создан тестовый куб");

const loader=new THREE.GLTFLoader();
loader.load("./clock-animation.glb",(gltf)=>{debug("GLB загружен");const model=gltf.scene;model.scale.set(0.5,0.5,0.5);model.position.set(0,0.2,0);anchor.group.add(model);
if(gltf.animations.length){const mixer=new THREE.AnimationMixer(model);gltf.animations.forEach(c=>mixer.clipAction(c).play());const clock=new THREE.Clock();renderer.setAnimationLoop(()=>{mixer.update(clock.getDelta());mindar.update();renderer.render(scene,camera);});}},undefined,(err)=>{debug("Ошибка загрузки модели");console.error(err);});

anchor.onTargetFound=()=>{status("Цель найдена!");debug("TARGET FOUND");}
anchor.onTargetLost=()=>{status("Ищу маркер...");debug("TARGET LOST");}

try{await mindar.start();status("Наведи камеру на маркер");debug("MindAR запущен");}catch(e){status("Ошибка камеры");debug(e.message);return;}
renderer.setAnimationLoop(()=>{mindar.update();renderer.render(scene,camera);});
});
</script>
</body>
</html>
