<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebAR Clock</title>

<!-- Локальные библиотеки -->
<script src="./aframe.min.js"></script>
<script src="./mindar.js"></script>

<style>
  body {
    margin:0;
    overflow:hidden;
    font-family: Arial, sans-serif;
  }

  #ui {
    position: fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.6);
    color:white;
    padding:10px 18px;
    border-radius:10px;
    font-size:16px;
    z-index:10;
  }
</style>
</head>

<body>

<div id="ui">Загрузка...</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>

  <!-- Камера -->
  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

  <!-- Освещение -->
  <a-light type="ambient" intensity="0.8"></a-light>
  <a-light type="directional" intensity="0.9" position="1 2 1"></a-light>

  <!-- Target -->
  <a-entity mindar-image-target="targetIndex: 0">

      <!-- 3D модель -->
      <a-gltf-model
        id="clockModel"
        src="./clock-animation.glb"
        position="0 0 0"
        scale="0.5 0.5 0.5"
        rotation="0 0 0"
        animation-mixer>
      </a-gltf-model>

  </a-entity>

</a-scene>


<script>
document.addEventListener("DOMContentLoaded", () => {

  const ui = document.getElementById("ui");
  const scene = document.querySelector("a-scene");
  const target = document.querySelector('[mindar-image-target]');

  ui.innerText = "Ищу часы...";

  // цель найдена
  target.addEventListener("targetFound", () => {
      ui.innerText = "Часы найдены!";
  });

  // цель потеряна
  target.addEventListener("targetLost", () => {
      ui.innerText = "Ищу часы...";
  });

  // ошибка AR (например нет камеры)
  scene.addEventListener("arError", () => {
      ui.innerText = "Ошибка доступа к камере";
      console.error("AR Error: нет доступа к камере или WebXR");
  });

});
</script>

</body>
</html>
