<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR: Часы с анимацией</title>
    
    <!-- Локальные библиотеки -->
    <script src="aframe.min.js"></script>
    <script src="mindar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #ui {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: fit-content;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }
        
        #ui.success {
            background: rgba(40, 167, 69, 0.9);
        }
        
        #ui.error {
            background: rgba(220, 53, 69, 0.9);
        }
        
        .instructions {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            text-align: center;
            color: white;
            font-size: 14px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 999;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(3px);
            width: fit-content;
            margin: 0 auto;
        }
        
        /* Убираем серый фон */
        .a-enter-vr, .a-enter-ar {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="ui">Загрузка...</div>
    <div class="instructions">Наведите камеру на изображение часов</div>

    <!-- AR Сцена с правильными настройками -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterBeta: 0.001; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
        color-space="sRGB"
        embedded
        renderer="colorManagement: true; antialias: true; alpha: true; physicallyCorrectLights: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        background="transparent: true;"
        stats="false"
    >
        <!-- Камера с правильными настройками для AR -->
        <a-camera id="camera" position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
        
        <!-- Освещение -->
        <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
        <a-light type="directional" color="#ffffff" intensity="2.0" position="1 2 1"></a-light>
        <a-light type="directional" color="#fff9e6" intensity="1.5" position="-1 1 0.5"></a-light>
        
        <!-- 3D Модель часов - ПОДНЯТА НАД ПОВЕРХНОСТЬЮ -->
        <a-entity 
            mindar-image-target="targetIndex: 0"
            gltf-model="./clock-animation.glb"
            scale="0.5 0.5 0.5"
            position="0 0.5 0"        <!-- Поднято на 0.5 над поверхностью -->
            rotation="0 0 0"
            id="clock-model"
            animation-mixer="clip: *; loop: repeat; timeScale: 1"
        ></a-entity>
    </a-scene>

    <script>
        (function() {
            const uiElement = document.getElementById('ui');
            const modelEntity = document.getElementById('clock-model');
            
            function setStatus(text, type = 'info') {
                uiElement.textContent = text;
                uiElement.className = '';
                if (type === 'success') uiElement.classList.add('success');
                else if (type === 'error') uiElement.classList.add('error');
            }
            
            document.addEventListener('DOMContentLoaded', function() {
                setStatus('Инициализация...');
                
                const scene = document.querySelector('a-scene');
                
                if (!scene) {
                    setStatus('Ошибка: сцена не найдена', 'error');
                    return;
                }
                
                // Принудительно делаем фон прозрачным
                scene.setAttribute('background', 'transparent: true');
                
                scene.addEventListener('arReady', function() {
                    console.log('MindAR готов');
                    setStatus('Ищу часы...');
                });
                
                scene.addEventListener('arError', function(event) {
                    console.error('AR ошибка:', event.detail.error);
                    setStatus('Ошибка доступа к камере', 'error');
                });
                
                // Обработка загрузки модели
                if (modelEntity) {
                    modelEntity.addEventListener('model-loaded', function() {
                        console.log('Модель успешно загружена');
                        setStatus('Модель загружена');
                        
                        // Поднимаем модель еще выше для наглядности
                        modelEntity.setAttribute('position', '0 0.7 0');
                    });
                    
                    modelEntity.addEventListener('model-error', function() {
                        console.error('Ошибка загрузки модели');
                        setStatus('Ошибка загрузки 3D модели', 'error');
                        
                        // Создаем тестовый куб, если модель не загрузилась
                        const testCube = document.createElement('a-entity');
                        testCube.setAttribute('mindar-image-target', 'targetIndex: 0');
                        testCube.setAttribute('geometry', 'primitive: box; width: 0.5; height: 0.5; depth: 0.5');
                        testCube.setAttribute('material', 'color: red; emissive: #333;');
                        testCube.setAttribute('position', '0 0.5 0');
                        scene.appendChild(testCube);
                    });
                }
                
                // События обнаружения цели
                const target = document.querySelector('[mindar-image-target]');
                if (target) {
                    target.addEventListener('targetFound', function() {
                        console.log('Цель найдена!');
                        setStatus('Часы найдены! ✓', 'success');
                        
                        // Логируем позицию для отладки
                        if (modelEntity) {
                            const pos = modelEntity.getAttribute('position');
                            console.log('Позиция модели:', pos);
                        }
                    });
                    
                    target.addEventListener('targetLost', function() {
                        console.log('Цель потеряна');
                        setStatus('Ищу часы...');
                    });
                }
                
                // Боремся с серым фоном
                setTimeout(() => {
                    const videoElements = document.querySelectorAll('video');
                    videoElements.forEach(video => {
                        if (video.style) {
                            video.style.objectFit = 'cover';
                        }
                    });
                    
                    // Убираем возможные серые overlay
                    const overlays = document.querySelectorAll('.a-scene, .a-canvas, canvas');
                    overlays.forEach(el => {
                        if (el.style) {
                            el.style.backgroundColor = 'transparent';
                        }
                    });
                }, 1000);
            });
        })();
    </script>
</body>
</html>
