<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Clock: Final Build</title>
    
    <!-- Локальные библиотеки -->
    <script src="./aframe.min.js"></script>
    <script src="./mindar.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: transparent !important; }
        /* Агрессивная очистка фонов для работы камеры */
        * { background-color: transparent !important; }
        video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; position: absolute; top:0; left:0; }
        
        #ui {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; background: rgba(0, 0, 0, 0.75) !important;
            color: white; border-radius: 40px; font-family: sans-serif;
            z-index: 10000; transition: background 0.3s; pointer-events: none;
        }
        #ui.success { background: rgba(40, 167, 69, 0.9) !important; }
        #ui.error { background: rgba(220, 53, 69, 0.9) !important; }
    </style>
</head>
<body>
    <div id="ui">Загрузка библиотек...</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no; filterBeta: 0.01;"
        embedded color-space="sRGB" renderer="colorManagement: true; alpha: true"
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="clockAsset" src="./clock-animation.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-light type="ambient" intensity="1.5"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>

        <!-- Основной таргет -->
        
            <!-- СИНЯЯ ПЛОСКОСТЬ (отладка: показывает где центр часов) -->
            

            <!-- МОДЕЛЬ -->
            
            
        
    </a-scene>

    <script>
        (function() {
            const ui = document.getElementById('ui');
            const model = document.getElementById('clock-model');
            const debugPlane = document.getElementById('debug-plane');
            const scene = document.querySelector('a-scene');

            const setStatus = (txt, cls) => {
                ui.innerText = txt;
                ui.className = cls || '';
            };

            // Принудительная прозрачность (фикс черного экрана)
            const fixBg = () => {
                document.querySelectorAll('canvas, .a-scene').forEach(el => {
                    el.style.backgroundColor = 'transparent';
                });
            };

            scene.addEventListener('arReady', () => {
                setStatus('Ищу часы...');
                fixBg();
            });

            scene.addEventListener('arError', () => setStatus('Ошибка камеры', 'error'));

            // Логика отладки высоты
            const heights = [0, 0.2, 0.5, 1.0];
            let hIdx = 0;

            model.addEventListener('model-loaded', () => {
                console.log('Модель на базе');
                
                // ЗАПУСК ЦИКЛА ВЫСОТЫ (удалить после тестов)
                setInterval(() => {
                    const targetComp = document.querySelector('#target').components['mindar-image-target'];
                    if (targetComp && targetComp.hasFound) {
                        const newH = heights[hIdx % heights.length];
                        model.setAttribute('position', `0 ${newH} 0`);
                        console.log("Тестовая высота:", newH);
                        hIdx++;
                    }
                }, 3000);
            });

            model.addEventListener('model-error', () => setStatus('Ошибка 3D модели', 'error'));

            const target = document.querySelector('#target');
            target.addEventListener('targetFound', () => {
                setStatus('Часы найдены! ✓', 'success');
                debugPlane.setAttribute('visible', 'true');
                setTimeout(() => debugPlane.setAttribute('visible', 'false'), 2000);
            });

            target.addEventListener('targetLost', () => setStatus('Ищу часы...'));

            // Постоянная очистка фона
            setInterval(fixBg, 1000);
        })();
    </script>
</body>
</html>
