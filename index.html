<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="./aframe.min.js"></script>
    <script src="./mindar.js"></script>
    <style>
      body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
      #ui {
        position: absolute; top: 20px; left: 20px; z-index: 9999;
        color: #fff; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
        font-family: Arial, sans-serif; pointer-events: none;
      }
      /* Принудительно растягиваем контейнеры A-Frame */
      .a-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; position: absolute !important; }
      video { width: 100% !important; height: 100% !important; object-fit: cover !important; position: absolute !important; top: 0 !important; left: 0 !important; }
    </style>
  </head>
  <body>
    <div id="ui">СТАТУС: ЗАГРУЗКА...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes; uiLoading: no;" 
      embedded 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="clockModel" src="./clock-animation.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      
        <!-- ЯРКИЙ ТЕСТОВЫЙ КУБ -->
        <a-box color="#FF0000" position="0 0 0.1" scale="0.3 0.3 0.3"></a-box>
        <!-- ТВОЯ МОДЕЛЬ -->
        <a-gltf-model src="#clockModel" position="0 0 0" scale="1 1 1"></a-gltf-model>
      

      <a-light type="ambient" intensity="1.5"></a-light>
    </a-scene>

    <script>
      const ui = document.getElementById('ui');
      const sceneEl = document.querySelector('a-scene');

      // Проверка: загрузился ли файл .mind?
      sceneEl.addEventListener("arReady", () => { ui.innerText = "ИЩУ ЧАСЫ..."; });
      sceneEl.addEventListener("arError", (e) => { ui.innerText = "ОШИБКА КАМЕРЫ"; });

      const targetEl = document.querySelector('#target');
      targetEl.addEventListener("targetFound", () => {
        ui.innerText = "ЕСТЬ КОНТАКТ!";
        ui.style.background = "green";
      });
      targetEl.addEventListener("targetLost", () => {
        ui.innerText = "ПОТЕРЯНО. НАВЕДИТЕ СНОВА";
        ui.style.background = "rgba(0,0,0,0.8)";
      });

      // Хак для принудительного ресайза при старте
      window.onload = () => { window.dispatchEvent(new Event('resize')); };
    </script>
  </body>
</html>
