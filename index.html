<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>3D Визуализатор | Строительные объекты</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
        background: #3a3a4a;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .ui-overlay {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 20;
        padding: 12px 16px 20px;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.7) 0%,
          rgba(0, 0, 0, 0.2) 70%,
          transparent 100%
        );
        pointer-events: none;
      }

      .ar-main-btn {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        border: none;
        width: 100%;
        padding: 12px;
        border-radius: 48px;
        color: white;
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 12px;
        cursor: pointer;
        pointer-events: auto;
        box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
        transition: transform 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .ar-main-btn:active {
        transform: scale(0.97);
      }

      .cards-row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        pointer-events: auto;
      }
      .feature-card {
        flex: 1;
        background: rgba(30, 30, 40, 0.8);
        backdrop-filter: blur(16px);
        border-radius: 16px;
        padding: 8px 4px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .feature-card:active {
        transform: scale(0.96);
        background: rgba(50, 50, 70, 0.9);
      }
      .feature-card.active {
        background: #27ae60;
        border-color: #2ecc71;
      }
      .feature-icon {
        font-size: 20px;
        margin-bottom: 2px;
      }
      .feature-text {
        color: white;
        font-size: 10px;
        font-weight: 500;
      }

      .tool-panel {
        pointer-events: auto;
        transition: opacity 0.3s;
      }
      .tool-panel.hidden {
        display: none;
      }

      .layers-panel {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .layer-btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        padding: 6px 14px;
        border-radius: 30px;
        color: white;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: 0.2s;
      }
      .layer-btn.active {
        background: #27ae60;
      }
      .layer-btn:active {
        transform: scale(0.95);
      }

      .section-btn {
        background: #ff8844;
        border: none;
        padding: 8px 16px;
        border-radius: 30px;
        color: white;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        margin-bottom: 10px;
        transition: 0.2s;
      }
      .section-btn:active {
        transform: scale(0.97);
      }

      .reset-row {
        display: flex;
        gap: 8px;
        pointer-events: auto;
      }
      .reset-btn {
        flex: 1;
        background: rgba(255, 255, 255, 0.12);
        border: none;
        padding: 8px;
        border-radius: 30px;
        color: white;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: 0.2s;
      }
      .reset-btn:active {
        transform: scale(0.97);
        background: rgba(255, 255, 255, 0.2);
      }

      .status {
        text-align: center;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 8px;
        pointer-events: none;
      }

      /* Галерея */
      .gallery-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(20px);
        z-index: 100;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        transition: opacity 0.3s;
        opacity: 0;
        pointer-events: none;
      }
      .gallery-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
      .gallery-title {
        color: white;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 20px;
        text-align: center;
      }
      .gallery-grid {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 800px;
      }
      .gallery-card {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 20px;
        width: 200px;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .gallery-card:hover {
        transform: scale(1.05);
        background: rgba(255, 255, 255, 0.2);
      }
      .gallery-card:active {
        transform: scale(0.98);
      }
      .gallery-icon {
        font-size: 64px;
        margin-bottom: 16px;
      }
      .gallery-name {
        color: white;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 8px;
      }
      .gallery-desc {
        color: #aaa;
        font-size: 12px;
        margin-bottom: 16px;
      }
      .gallery-badge {
        display: inline-block;
        background: #27ae60;
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 11px;
        color: white;
      }
      .close-gallery {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        border-radius: 40px;
        padding: 10px 20px;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }

      .info-toast {
        position: fixed;
        bottom: 200px;
        left: 16px;
        right: 16px;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 12px;
        z-index: 30;
        transition:
          transform 0.3s,
          opacity 0.3s;
        transform: translateY(100px);
        opacity: 0;
        pointer-events: none;
        max-width: 320px;
        margin: 0 auto;
      }
      .info-toast.show {
        transform: translateY(0);
        opacity: 1;
      }
      .info-toast h4 {
        color: #ffaa44;
        margin-bottom: 6px;
        font-size: 13px;
      }
      .info-toast p {
        color: white;
        font-size: 11px;
        line-height: 1.4;
      }

      @media (min-width: 768px) {
        .ui-overlay {
          max-width: 400px;
          left: auto;
          right: 0;
          background: linear-gradient(
            to left,
            rgba(0, 0, 0, 0.6) 0%,
            transparent 100%
          );
        }
        .gallery-grid {
          flex-direction: row;
        }
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="ui-overlay">
      <button id="ar-btn" class="ar-main-btn">
        <span>🔍</span> Смотреть в AR
      </button>

      <div class="cards-row">
        <div id="gallery-btn" class="feature-card">
          <div class="feature-icon">🏘️</div>
          <div class="feature-text">Выбрать дом</div>
        </div>
        <div id="section-btn" class="feature-card">
          <div class="feature-icon">✂️</div>
          <div class="feature-text">Разрез</div>
        </div>
        <div id="materials-btn" class="feature-card">
          <div class="feature-icon">🧱</div>
          <div class="feature-text">Материалы</div>
        </div>
      </div>

      <!-- Панель для функции "Выбор дома" -->
      <div id="panel-function1" class="tool-panel">
        <div class="reset-row">
          <button id="reset-camera-f1" class="reset-btn">🔄 Сброс вида</button>
        </div>
      </div>

      <!-- Панель для функции "Разрез" (с кнопкой Сечение) -->
      <div id="panel-function2" class="tool-panel hidden">
        <button id="toggle-section" class="section-btn">
          ✂️ ВКЛЮЧИТЬ СЕЧЕНИЕ
        </button>
        <div class="layers-panel">
          <button id="toggle-roof" class="layer-btn">🏠 Крыша</button>
          <button id="toggle-walls" class="layer-btn">🧱 Фасад</button>
          <button id="toggle-partitions" class="layer-btn">
            🚪 Перегородки
          </button>
        </div>
        <div class="reset-row">
          <button id="reset-camera-f2" class="reset-btn">🔄 Сброс вида</button>
          <button id="reset-layers" class="reset-btn">🔄 Сброс слоёв</button>
        </div>
      </div>

      <!-- Панель для функции "Материалы" -->
      <div id="panel-function3" class="tool-panel hidden">
        <div class="reset-row">
          <button id="reset-camera-f3" class="reset-btn">🔄 Сброс вида</button>
        </div>
      </div>

      <div class="status" id="status">3D режим | Выберите функцию</div>
    </div>

    <!-- Галерея -->
    <div id="gallery" class="gallery-overlay">
      <button id="close-gallery" class="close-gallery">✕ Закрыть</button>
      <div class="gallery-title">🏠 Выберите свой дом</div>
      <div class="gallery-grid">
        <div
          class="gallery-card"
          data-model="./model.glb"
          data-name="Коттедж «Альфа»"
          data-desc="220 м² • Кирпич • 2 этажа"
        >
          <div class="gallery-icon">🏰</div>
          <div class="gallery-name">Коттедж «Альфа»</div>
          <div class="gallery-desc">220 м² • Кирпич • 2 этажа</div>
          <span class="gallery-badge">Современный</span>
        </div>
        <div
          class="gallery-card"
          data-model="./house.glb"
          data-name="Дом «Бета»"
          data-desc="180 м² • Газоблок • 1 этаж"
        >
          <div class="gallery-icon">🏡</div>
          <div class="gallery-name">Дом «Бета»</div>
          <div class="gallery-desc">180 м² • Газоблок • 1 этаж</div>
          <span class="gallery-badge">Компактный</span>
        </div>
      </div>
    </div>

    <div id="info-toast" class="info-toast">
      <h4>📋 Информация</h4>
      <p id="info-text">Нажмите на элемент, чтобы узнать материал</p>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="main.js"></script>
  </body>
</html>
