<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Подключаем твои локальные файлы библиотек -->
    <script src="./aframe.min.js"></script>
    <script src="./mindar.js"></script>
    <style>
      body { margin: 0; background: #000; overflow: hidden; }
      #ui {
        position: fixed; top: 10px; left: 10px; z-index: 999;
        color: white; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="ui">Наведите камеру на циферблат часов</div>

    <!-- Сцена с твоим маркером -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- Твоя модель -->
        <a-asset-item id="clockModel" src="./clock-animation.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Основной контейнер AR -->
      
        
        <!-- 1. ТЕСТОВЫЙ КРАСНЫЙ КУБ (удалим потом, когда увидим модель) -->
        <a-box color="red" position="0 0 0.1" scale="0.2 0.2 0.2"></a-box>

        <!-- 2. ТВОЯ МОДЕЛЬ (увеличил масштаб до 1 1 1 для видимости) -->
        <a-gltf-model 
          src="#clockModel" 
          position="0 0 0" 
          scale="1 1 1" 
          rotation="0 0 0">
        </a-gltf-model>

      

      <!-- Добавляем свет, чтобы модель была видна -->
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="0 1 1" intensity="0.5"></a-light>

    </a-scene>

    <script>
      // Смена текста при нахождении цели
      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener("targetFound", event => {
        document.getElementById('ui').innerText = "ЧАСЫ НАЙДЕНЫ! СМОТРИТЕ АНИМАЦИЮ";
      });
      target.addEventListener("targetLost", event => {
        document.getElementById('ui').innerText = "ПОТЕРЯНО. НАВЕДИТЕ СНОВА";
      });
    </script>
  </body>
</html>
