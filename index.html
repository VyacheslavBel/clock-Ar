<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- ИСПРАВЛЕНО: Полные ссылки на движки -->
    <script src="https://aframe.io"></script>
    <script src="https://cdn.jsdelivr.net"></script>
  </head>
  <body>
    <!-- Сцена с твоим маркером -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- Твоя модель -->
        <a-asset-item id="myModel" src="./clock-animation.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- ИСПРАВЛЕНО: Добавлен контейнер-таргет, который ищет часы -->
      
        <a-gltf-model src="#myModel" position="0 0 0" scale="0.1 0.1 0.1" rotation="0 0 0"></a-gltf-model>
      
      
    </a-scene>
  </body>
</html>
