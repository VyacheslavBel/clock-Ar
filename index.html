<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Clock Project</title>
    
    <!-- 1. Основной движок A-Frame (Зеркало Cloudflare - самое надежное) -->
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <!-- 2. AR-дополнение MindAR (Зеркало jsDelivr) -->
    <script src="https://cdn.jsdelivr.net"></script>

    <style>
      body { margin: 0; background: #000; overflow: hidden; }
      /* Текст, который покажет, что страница жива */
      #loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; color: #fff; display: flex;
        align-items: center; justify-content: center; z-index: 999;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="loading">ЗАГРУЗКА КАМЕРЫ И AR...</div>

    <!-- Сцена: указываем путь к твоему файлу .mind -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- Твоя 3D модель в формате .glb -->
        <a-asset-item id="clockModel" src="./clock-animation.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Контейнер, который привязан к твоим часам (targetIndex: 0) -->
      
        <a-gltf-model 
          src="#clockModel" 
          position="0 0 0" 
          scale="0.1 0.1 0.1" 
          rotation="0 0 0">
        </a-gltf-model>
      
    </a-scene>

    <script>
      // Скрываем надпись загрузки, когда AR-движок готов
      const sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener("arReady", (event) => {
        document.getElementById('loading').style.display = 'none';
      });
      // Если возникла ошибка (например, камера запрещена)
      sceneEl.addEventListener("arError", (event) => {
        document.getElementById('loading').innerText = "Ошибка: разрешите доступ к камере";
      });
    </script>
  </body>
</html>
