<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Clock Fix</title>
    <script src="./aframe.min.js"></script>
    <script src="./mindar.js"></script>
    <style>
      /* Убираем все отступы и черноту */
      body { margin: 0; overflow: hidden; background: #000; width: 100vw; height: 100vh; }
      
      /* Заставляем видео и сцену занять ВЕСЬ экран */
      .mindar-ui-overlay { z-index: 10; }
      a-scene { width: 100%; height: 100%; }
      
      /* Наш индикатор сверху */
      #ui {
        position: fixed; top: 10px; left: 10px; z-index: 1000;
        color: white; font-family: sans-serif; background: rgba(0,0,0,0.7);
        padding: 8px 15px; border-radius: 20px; pointer-events: none;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="ui">СТАТУС: ПОИСК КАМЕРЫ...</div>

    <!-- Добавили свойство inspector="url: ..." чтобы не грузило лишнего -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes; uiLoading: no; filterMinCF:0.001; filterBeta: 0.01;" 
      embedded
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="clockModel" src="./clock-animation.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Тестовый объект (красный куб) + твоя модель -->
      
        <!-- КУБ ВЫНЕСЕН ВПЕРЕД (Z=0.2) ЧТОБЫ БЫЛО ВИДНО -->
        <a-box color="red" position="0 0 0.2" scale="0.3 0.3 0.3"></a-box>
        
        <a-gltf-model 
          src="#clockModel" 
          position="0 0 0" 
          scale="1 1 1">
        </a-gltf-model>
      

      <a-light type="ambient" intensity="1.5"></a-light>
    </a-scene>

    <script>
      const ui = document.getElementById('ui');
      const sceneEl = document.querySelector('a-scene');

      sceneEl.addEventListener("arReady", () => { ui.innerText = "КАМЕРА OK. ИЩУ ЧАСЫ..."; });
      
      const targetEl = document.querySelector('#target');
      targetEl.addEventListener("targetFound", () => {
        ui.innerText = "ЧАСЫ НАЙДЕНЫ!";
        ui.style.background = "#27ae60"; // Зеленый
      });
      targetEl.addEventListener("targetLost", () => {
        ui.innerText = "ПОТЕРЯНО. НАВЕДИТЕ НА ЦИФЕРБЛАТ";
        ui.style.background = "rgba(0,0,0,0.7)";
      });
    </script>
  </body>
</html>
