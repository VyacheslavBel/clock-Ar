<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR: Часы - Чистый MindAR</title>
    
    <!-- Подключаем Three.js и MindAR -->
    <script src="three.js"></script>
    <script src="mindar.js"></script>
    <script src="three.js"></script>
    <script src="GLTFLoader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            font-size: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        #ui.success {
            background: rgba(40, 167, 69, 0.9);
        }
        
        #ui.error {
            background: rgba(220, 53, 69, 0.9);
        }
        
        #debug {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 10px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            display: none;
        }
        
        #debug.visible {
            display: block;
        }
        
        .instructions {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            text-align: center;
            color: white;
            font-size: 14px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="ui">Загрузка...</div>
    <div class="instructions">Наведите камеру на изображение часов</div>
    <div id="debug"></div>

    <script>
        // Функция для отладки
        function debug(message) {
            console.log(message);
            const debugEl = document.getElementById('debug');
            debugEl.classList.add('visible');
            const time = new Date().toLocaleTimeString();
            debugEl.innerHTML += `[${time}] ${message}<br>`;
            
            // Ограничиваем количество строк
            const lines = debugEl.innerHTML.split('<br>');
            if (lines.length > 15) {
                lines.shift();
                debugEl.innerHTML = lines.join('<br>');
            }
        }

        function setStatus(text, type = 'info') {
            const ui = document.getElementById('ui');
            ui.textContent = text;
            ui.className = '';
            if (type === 'success') ui.classList.add('success');
            if (type === 'error') ui.classList.add('error');
        }

        // Проверка наличия Three.js
        if (typeof THREE === 'undefined') {
            setStatus('Ошибка: Three.js не загружен', 'error');
            debug('Three.js не загружен');
            throw new Error('Three.js not loaded');
        }

        debug(`Three.js версия: ${THREE.REVISION}`);

        // Запуск AR после загрузки страницы
        document.addEventListener('DOMContentLoaded', async () => {
            setStatus('Инициализация AR...');
            debug('Инициализация MindAR...');

            // Проверяем наличие файла маркера
            try {
                const response = await fetch('./targets.mind');
                if (!response.ok) {
                    throw new Error(`targets.mind не найден (${response.status})`);
                }
                debug('targets.mind найден');
            } catch (e) {
                setStatus('Ошибка: targets.mind не найден', 'error');
                debug(`Ошибка загрузки маркера: ${e.message}`);
                return;
            }

            // Создаем MindAR контроллер
            const mindarController = new window.MINDAR.IMAGE.MindARThree({
                container: document.body,
                imageTargetSrc: './targets.mind',
                maxTrack: 1,
                filterMinCF: 0.001,
                filterBeta: 0.001,
                warmupTolerance: 5,
                missTolerance: 5
            });

            debug('MindAR контроллер создан');

            const { renderer, scene, camera } = mindarController;

            // Настраиваем рендерер
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0); // Прозрачный фон

            // Настраиваем камеру
            camera.near = 0.1;
            camera.far = 100;
            camera.updateProjectionMatrix();

            // Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(1, 2, 1);
            scene.add(dirLight);

            const dirLight2 = new THREE.DirectionalLight(0xfff9e6, 1.5);
            dirLight2.position.set(-1, 1, 0.5);
            scene.add(dirLight2);

            // Загрузчик GLTF
            const loader = new THREE.GLTFLoader();
            
            // Группа для модели
            const modelGroup = new THREE.Group();
            
            // Загружаем модель
            try {
                debug('Загрузка clock-animation.glb...');
                
                // Проверяем существование файла
                const modelResponse = await fetch('./clock-animation.glb', { method: 'HEAD' });
                if (!modelResponse.ok) {
                    throw new Error(`clock-animation.glb не найден (${modelResponse.status})`);
                }
                debug('clock-animation.glb найден');

                loader.load('./clock-animation.glb', 
                    (gltf) => {
                        debug('Модель успешно загружена');
                        
                        const model = gltf.scene;
                        
                        // Масштабируем модель
                        model.scale.set(0.5, 0.5, 0.5);
                        
                        // Поднимаем модель над поверхностью
                        model.position.set(0, 0.5, 0);
                        
                        // Добавляем в группу
                        modelGroup.add(model);
                        
                        // Запускаем анимации если есть
                        if (gltf.animations && gltf.animations.length) {
                            debug(`Найдено анимаций: ${gltf.animations.length}`);
                            const mixer = new THREE.AnimationMixer(model);
                            gltf.animations.forEach((clip) => {
                                mixer.clipAction(clip).play();
                            });
                            
                            // Обновляем анимации в цикле
                            const clock = new THREE.Clock();
                            const animate = () => {
                                requestAnimationFrame(animate);
                                const delta = clock.getDelta();
                                mixer.update(delta);
                            };
                            animate();
                        }
                    },
                    (progress) => {
                        // Прогресс загрузки
                        if (progress.lengthComputable) {
                            const percent = (progress.loaded / progress.total * 100).toFixed(0);
                            debug(`Загрузка модели: ${percent}%`);
                        }
                    },
                    (error) => {
                        debug(`Ошибка загрузки модели: ${error.message}`);
                        setStatus('Ошибка загрузки 3D модели', 'error');
                        
                        // Создаем тестовый куб для проверки
                        const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                        const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                        const cube = new THREE.Mesh(geometry, material);
                        cube.position.set(0, 0.5, 0);
                        modelGroup.add(cube);
                        debug('Создан тестовый красный куб');
                    }
                );
            } catch (e) {
                debug(`Ошибка: ${e.message}`);
            }

            // Создаем якорь для отслеживания
            const anchor = mindarController.addAnchor(0);
            anchor.group.add(modelGroup);

            // События цели
            anchor.onTargetFound = () => {
                debug('Цель НАЙДЕНА!');
                setStatus('Часы найдены! ✓', 'success');
                
                // Показываем позицию
                const pos = modelGroup.position;
                debug(`Позиция модели: x=${pos.x.toFixed(2)}, y=${pos.y.toFixed(2)}, z=${pos.z.toFixed(2)}`);
                
                // Пробуем разные высоты
                let height = 0.5;
                setInterval(() => {
                    if (anchor.group.visible) {
                        modelGroup.position.set(0, height, 0);
                        debug(`Изменена высота на: ${height}`);
                        height += 0.2;
                        if (height > 1.5) height = 0.5;
                    }
                }, 2000);
            };

            anchor.onTargetLost = () => {
                debug('Цель потеряна');
                setStatus('Ищу часы...');
            };

            // Запускаем AR
            try {
                await mindarController.start();
                debug('MindAR запущен');
                setStatus('Ищу часы...');
            } catch (e) {
                setStatus('Ошибка доступа к камере', 'error');
                debug(`Ошибка запуска: ${e.message}`);
                return;
            }

            // Обработка изменения размера окна
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Рендер цикл
            const render = () => {
                if (mindarController) {
                    mindarController.update();
                    renderer.render(scene, camera);
                }
                requestAnimationFrame(render);
            };
            
            render();

            debug('Готов к работе');
        });
    </script>
</body>
</html>
