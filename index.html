<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR: Часы с анимацией</title>
    
    <!-- Подключение локальных библиотек -->
    <script src="aframe.min.js"></script>
    <script src="mindar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Стили для интерфейса */
        #ui {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: fit-content;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            transition: background-color 0.3s;
        }
        
        #ui.success {
            background: rgba(40, 167, 69, 0.9);
        }
        
        #ui.error {
            background: rgba(220, 53, 69, 0.9);
        }
        
        #ui.warning {
            background: rgba(255, 193, 7, 0.9);
            color: #000;
        }
        
        /* Инструкция для пользователя */
        .instructions {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 999;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(3px);
            width: fit-content;
            margin: 0 auto;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Интерфейс статуса -->
    <div id="ui">Загрузка...</div>
    <div class="instructions">Наведите камеру на изображение часов</div>

    <!-- AR Сцена -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterBeta: 0.001;"
        color-space="sRGB"
        embedded
        renderer="colorManagement: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        gesture-detector
        stats="false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false; trackingMethod: best;"
    >
        <!-- Камера -->
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <!-- Освещение -->
        <a-entity light="type: ambient; color: #FFFFFF; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; color: #FFFFFF; intensity: 1.2; position: 1 2 1"></a-entity>
        <a-entity light="type: directional; color: #FFF9E6; intensity: 0.8; position: -1 1 0.5"></a-entity>
        
        <!-- 3D модель часов (привязана к targetIndex 0) -->
        <a-entity 
            mindar-image-target="targetIndex: 0"
            gltf-model="./clock-animation.glb"
            scale="1 1 1"
            position="0 0 0
            rotation="0 0 0"
            animation-mixer="clip: *; loop: repeat; timeScale: 1"
            id="clock-model"
        ></a-entity>
    </a-scene>

    <!-- Логика приложения -->
    <script>
        (function() {
            const uiElement = document.getElementById('ui');
            let scene = null;
            let mindarSystem = null;
            
            // Функция обновления статуса
            function setStatus(text, type = 'info') {
                uiElement.textContent = text;
                uiElement.className = ''; // Сброс классов
                if (type === 'success') {
                    uiElement.classList.add('success');
                } else if (type === 'error') {
                    uiElement.classList.add('error');
                } else if (type === 'warning') {
                    uiElement.classList.add('warning');
                }
            }
            
            // Ожидание полной загрузки DOM
            document.addEventListener('DOMContentLoaded', function() {
                setStatus('Инициализация...');
                
                // Поиск сцены
                scene = document.querySelector('a-scene');
                
                if (!scene) {
                    setStatus('Ошибка: сцена не найдена', 'error');
                    return;
                }
                
                // Обработчик загрузки сцены MindAR
                scene.addEventListener('arReady', function(event) {
                    console.log('MindAR готов к работе');
                    setStatus('Ищу часы...');
                    
                    // Сохраняем ссылку на систему MindAR
                    mindarSystem = event.detail.system;
                });
                
                // Обработчик ошибок AR (камера)
                scene.addEventListener('arError', function(event) {
                    console.error('Ошибка AR:', event.detail.error);
                    
                    let errorMessage = 'Ошибка доступа к камере';
                    if (event.detail.error && event.detail.error.message) {
                        if (event.detail.error.message.includes('Permission')) {
                            errorMessage = 'Нет разрешения на камеру';
                        } else if (event.detail.error.message.includes('NotFound')) {
                            errorMessage = 'Камера не найдена';
                        }
                    }
                    
                    setStatus(errorMessage, 'error');
                    
                    // Дополнительная информация для пользователя
                    setTimeout(() => {
                        if (uiElement.classList.contains('error')) {
                            setStatus('Проверьте разрешения и перезагрузите', 'error');
                        }
                    }, 3000);
                });
                
                // Поиск целевого изображения (часов)
                const target = document.querySelector('[mindar-image-target]');
                
                if (target) {
                    // Событие обнаружения цели
                    target.addEventListener('targetFound', function(event) {
                        console.log('Цель найдена!');
                        setStatus('Часы найдены! ✓', 'success');
                        
                        // Небольшая вибрация, если поддерживается (опционально)
                        if (navigator.vibrate) {
                            navigator.vibrate(50);
                        }
                    });
                    
                    // Событие потери цели
                    target.addEventListener('targetLost', function(event) {
                        console.log('Цель потеряна');
                        setStatus('Ищу часы...');
                    });
                } else {
                    console.warn('Элемент mindar-image-target не найден');
                }
                
                // Дополнительная проверка на наличие библиотек
                if (typeof AFRAME === 'undefined') {
                    setStatus('Ошибка: A-Frame не загружен', 'error');
                } else if (typeof window.MINDAR === 'undefined') {
                    setStatus('Ошибка: MindAR не загружен', 'error');
                }
                
                // Таймаут для отлова зависаний
                setTimeout(() => {
                    if (uiElement.textContent === 'Загрузка...' || uiElement.textContent === 'Инициализация...') {
                        setStatus('Проверьте камеру и маркер', 'warning');
                    }
                }, 10000);
            });
            
            // Обработка ошибок загрузки ресурсов
            window.addEventListener('error', function(event) {
                if (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK') {
                    console.error('Ошибка загрузки ресурса:', event.target.src || event.target.href);
                    setStatus('Ошибка загрузки библиотек', 'error');
                }
            }, true);
            
            // Дополнительная проверка на доступ к камере (для старых браузеров)
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('Ваш браузер не поддерживает камеру', 'error');
            }
        })();
    </script>
    
    <!-- Комментарий по настройке модели -->
    <!-- 
        Настройка 3D модели:
        - scale: масштаб модели (0.5 0.5 0.5) - можно менять
        - position: смещение модели (0 0 0) - можно менять
        - rotation: поворот модели (0 0 0) - можно менять
        - animation-mixer: управление анимацией (clip: * - все анимации)
        
        Для изменения положения модели относительно маркера,
        измените атрибуты position, scale, rotation у элемента с id="clock-model"
    -->
</body>
</html>
