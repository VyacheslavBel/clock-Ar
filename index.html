<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR: Часы с анимацией</title>
    
    <!-- Подключение локальных библиотек -->
    <script src="aframe.min.js"></script>
    <script src="mindar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #ui {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: fit-content;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            transition: background-color 0.3s;
        }
        
        #ui.success {
            background: rgba(40, 167, 69, 0.9);
        }
        
        #ui.error {
            background: rgba(220, 53, 69, 0.9);
        }
        
        #ui.warning {
            background: rgba(255, 193, 7, 0.9);
            color: #000;
        }
        
        #ui.debug {
            background: rgba(0, 0, 0, 0.9);
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            max-width: 90%;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .instructions {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 999;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(3px);
            width: fit-content;
            margin: 0 auto;
            pointer-events: none;
        }
        
        #debug-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 2000;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div id="ui">Загрузка...</div>
    <div class="instructions">Наведите камеру на изображение часов</div>
    <button id="debug-btn" style="display: none;">🐛 Отладка</button>

    <!-- AR Сцена - исправленная конфигурация -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterBeta: 0.001; showStats: true;"
        color-space="sRGB"
        embedded
        renderer="colorManagement: true; antialias: true; alpha: false;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        stats="false"
        background="color: black"
    >
        <!-- Камера с правильными настройками -->
        <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
        
        <!-- Освещение - усиленное -->
        <a-entity light="type: ambient; color: #FFFFFF; intensity: 1.5"></a-entity>
        <a-entity light="type: directional; color: #FFFFFF; intensity: 2.0; position: 1 2 1"></a-entity>
        <a-entity light="type: directional; color: #FFF9E6; intensity: 1.5; position: -1 1 0.5"></a-entity>
        
        <!-- 3D модель часов - с запасными параметрами и видимостью по умолчанию -->
        <a-entity 
            mindar-image-target="targetIndex: 0"
            id="clock-model"
            position="0 0 0"
            scale="1 1 1"
            rotation="0 0 0"
            visible="true"
        >
            <!-- Простая геометрия для теста, если glb не загрузится -->
            <a-box color="red" depth="0.2" height="0.2" width="0.2" position="0 0.5 0" visible="false" id="test-box"></a-box>
        </a-entity>
    </a-scene>

    <!-- Логика приложения с расширенной отладкой -->
    <script>
        (function() {
            const uiElement = document.getElementById('ui');
            const debugBtn = document.getElementById('debug-btn');
            let modelEntity = null;
            let testBox = null;
            let mindarSystem = null;
            
            // Функция отладки
            function debugLog(...args) {
                console.log('[DEBUG]', ...args);
                const currentText = uiElement.textContent;
                if (currentText.length < 100) { // Не переполняем UI
                    // setStatus(currentText + '\n' + args.join(' '), 'debug');
                }
            }
            
            function setStatus(text, type = 'info') {
                uiElement.textContent = text;
                uiElement.className = '';
                if (type === 'success') uiElement.classList.add('success');
                else if (type === 'error') uiElement.classList.add('error');
                else if (type === 'warning') uiElement.classList.add('warning');
                else if (type === 'debug') uiElement.classList.add('debug');
            }
            
            // Проверка наличия всех файлов
            async function checkFiles() {
                const files = [
                    './targets.mind',
                    './clock-animation.glb',
                    './aframe.min.js',
                    './mindar.js'
                ];
                
                for (const file of files) {
                    try {
                        const response = await fetch(file, { method: 'HEAD' });
                        if (!response.ok) {
                            setStatus(`Файл не найден: ${file}`, 'error');
                            return false;
                        }
                    } catch (e) {
                        setStatus(`Ошибка доступа к ${file}`, 'error');
                        return false;
                    }
                }
                return true;
            }
            
            document.addEventListener('DOMContentLoaded', async function() {
                setStatus('Проверка файлов...');
                
                // Проверяем наличие файлов
                const filesOk = await checkFiles();
                if (!filesOk) return;
                
                setStatus('Инициализация AR...');
                
                const scene = document.querySelector('a-scene');
                
                if (!scene) {
                    setStatus('Ошибка: сцена не найдена', 'error');
                    return;
                }
                
                // Ждем загрузки A-Frame
                if (!AFRAME) {
                    setStatus('Ошибка: A-Frame не загружен', 'error');
                    return;
                }
                
                // Регистрируем компонент для отладки загрузки модели
                AFRAME.registerComponent('model-debug', {
                    init: function() {
                        debugLog('Модель инициализирована');
                        this.el.addEventListener('model-loaded', () => {
                            debugLog('Модель успешно загружена');
                            setStatus('3D модель загружена!', 'success');
                        });
                        this.el.addEventListener('model-error', (e) => {
                            debugLog('Ошибка загрузки модели:', e.detail);
                            setStatus('Ошибка загрузки 3D модели', 'error');
                            
                            // Показываем тестовую геометрию
                            if (testBox) {
                                testBox.setAttribute('visible', 'true');
                                debugLog('Показан тестовый куб');
                            }
                        });
                    }
                });
                
                scene.addEventListener('arReady', function(event) {
                    debugLog('MindAR готов');
                    setStatus('Ищу часы...');
                    mindarSystem = event.detail.system;
                    
                    // Показываем кнопку отладки
                    debugBtn.style.display = 'block';
                });
                
                scene.addEventListener('arError', function(event) {
                    debugLog('AR ошибка:', event.detail.error);
                    setStatus('Ошибка камеры: ' + (event.detail.error.message || 'неизвестная'), 'error');
                });
                
                // Поиск модели после загрузки сцены
                scene.addEventListener('loaded', function() {
                    modelEntity = document.getElementById('clock-model');
                    testBox = document.getElementById('test-box');
                    
                    if (!modelEntity) {
                        setStatus('Ошибка: модель не найдена в DOM', 'error');
                        return;
                    }
                    
                    debugLog('Модель найдена в DOM');
                    
                    // Добавляем отладочный компонент
                    modelEntity.setAttribute('model-debug', '');
                    
                    // Пытаемся загрузить GLTF модель
                    modelEntity.setAttribute('gltf-model', './clock-animation.glb');
                    
                    // Добавляем анимацию если есть
                    if (typeof AFRAME.ANIMATION_MIXER !== 'undefined') {
                        modelEntity.setAttribute('animation-mixer', 'clip: *; loop: repeat;');
                    }
                });
                
                // События цели
                const target = document.querySelector('[mindar-image-target]');
                if (target) {
                    target.addEventListener('targetFound', function() {
                        debugLog('Цель найдена!');
                        setStatus('Часы найдены! ✓', 'success');
                        
                        // Принудительно показываем модель
                        if (modelEntity) {
                            modelEntity.setAttribute('visible', 'true');
                            debugLog('Модель видима: установлено true');
                        }
                        
                        if (navigator.vibrate) navigator.vibrate(50);
                    });
                    
                    target.addEventListener('targetLost', function() {
                        debugLog('Цель потеряна');
                        setStatus('Ищу часы...');
                    });
                }
                
                // Дополнительная проверка видимости
                setInterval(() => {
                    if (modelEntity) {
                        const visible = modelEntity.getAttribute('visible');
                        debugLog('Модель видима:', visible);
                    }
                }, 5000);
            });
            
            // Кнопка отладки
            debugBtn.addEventListener('click', function() {
                const modelEntity = document.getElementById('clock-model');
                if (modelEntity) {
                    alert('Модель: ' + modelEntity.getAttribute('visible') + 
                          '\nПозиция: ' + JSON.stringify(modelEntity.getAttribute('position')) +
                          '\nМасштаб: ' + JSON.stringify(modelEntity.getAttribute('scale')));
                }
            });
            
            // Обработка ошибок загрузки
            window.addEventListener('error', function(event) {
                if (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK') {
                    setStatus('Ошибка загрузки: ' + (event.target.src || event.target.href), 'error');
                }
            }, true);
        })();
    </script>
</body>
</html>
