<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindAR Test</title>

<!-- A-Frame -->
<script src="./aframe.min.js"></script>

<!-- ВАЖНО: именно этот файл -->
<script src="./mindar-image-aframe.prod.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

/* статус */
#ui{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px 20px;
border-radius:8px;
z-index:10;
}

/* debug таблица */

#debug{

position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
border-collapse:collapse;
z-index:10;

}

#debug td,#debug th{

border:1px solid #ccc;
padding:6px 10px;

}

</style>

</head>

<body>

<div id="ui">Загрузка AR...</div>

<table id="debug">

<tr>
<th>Параметр</th>
<th>Значение</th>
</tr>

<tr>
<td>Camera</td>
<td id="camera">loading</td>
</tr>

<tr>
<td>Target</td>
<td id="targetStatus">searching</td>
</tr>

<tr>
<td>Cube Visible</td>
<td id="cubeVisible">false</td>
</tr>

</table>


<a-scene
id="scene"
mindar-image="imageTargetSrc: ./targets.mind;"
embedded
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
color-space="sRGB"
renderer="colorManagement:true, physicallyCorrectLights"
>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-light type="ambient" intensity="1"></a-light>

<a-light type="directional" intensity="1" position="1 2 1"></a-light>


<a-entity id="target" mindar-image-target="targetIndex:0">

<a-box
id="cube"
color="red"
scale="0.3 0.3 0.3"
position="0 0 0">
</a-box>

</a-entity>

</a-scene>


<script>

document.addEventListener("DOMContentLoaded",()=>{

const ui=document.getElementById("ui")

const cameraStatus=document.getElementById("camera")
const targetStatus=document.getElementById("targetStatus")
const cubeVisible=document.getElementById("cubeVisible")

const scene=document.querySelector("#scene")
const target=document.querySelector("#target")
const cube=document.querySelector("#cube")


scene.addEventListener("arReady",()=>{

ui.innerText="AR запущен. Наведи на часы"
cameraStatus.innerText="ok"

})


scene.addEventListener("arError",()=>{

ui.innerText="Ошибка камеры"
cameraStatus.innerText="error"

})


target.addEventListener("targetFound",()=>{

targetStatus.innerText="found"
cubeVisible.innerText="true"

})


target.addEventListener("targetLost",()=>{

targetStatus.innerText="lost"
cubeVisible.innerText="false"

})

})

</script>

</body>
</html>
